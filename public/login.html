<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Reisplanner</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0369a1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>* { box-sizing: border-box; } body { background: #f0f9ff; font-family: system-ui, sans-serif; margin: 0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm text-center">
    <div class="text-5xl mb-3">✈️</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Reisplanner</h1>
    <p class="text-gray-500 text-sm mb-8">Log in om je reizen te bekijken</p>

    <div id="error" class="hidden bg-red-50 text-red-700 text-sm px-3 py-2 rounded-lg mb-4">
      Er ging iets mis. Probeer het opnieuw.
    </div>

    <div class="space-y-3">
      <a href="/auth/google"
        class="flex items-center justify-center gap-3 w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Doorgaan met Google
      </a>

      <a href="/auth/apple"
        class="flex items-center justify-center gap-3 w-full bg-black text-white rounded-xl px-4 py-3 text-sm font-medium hover:bg-gray-900 transition-colors">
        <svg width="16" height="18" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.6-155.5-127.4C46 790.7 0 663 0 541.8c0-207.3 135.4-316.6 269.2-316.6 70.4 0 128.9 46.4 173.1 46.4 42.8 0 109.9-49.1 192.5-49.1zm-25.8-200.8c39.5-46.4 67.4-110.8 67.4-175.2 0-9-1.3-18.1-2.6-27.1-63.6 2.6-139.3 42.2-185.1 95.4-36.2 41.5-68.7 105.9-68.7 171.3 0 9.7 1.9 19.3 2.6 22.5 4.5.6 11.6 1.9 18.7 1.9 57.4 0 127.4-38.2 167.7-88.8z"/></svg>
        Doorgaan met Apple
      </a>
    </div>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error').classList.remove('hidden');
    }
  </script>
</body>
</html>
