<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reisplanner</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reisplanner" />
  <meta name="theme-color" content="#0369a1" />
  <meta property="og:title" content="Reisplanner" />
  <meta property="og:description" content="Jouw reizen, overzichtelijk gepland" />
  <meta property="og:image" content="/icon-512.png" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: "#f0f9ff", 100: "#e0f2fe", 200: "#bae6fd", 300: "#7dd3fc",
              400: "#38bdf8", 500: "#0ea5e9", 600: "#0284c7", 700: "#0369a1",
              800: "#075985", 900: "#0c4a6e",
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.3/babel.min.js"></script>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('js-error');
      if (el) { el.style.display = 'block'; el.querySelector('p').textContent = msg + ' (' + (src||'') + ':' + line + ')'; }
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('js-error');
      if (el) { el.style.display = 'block'; el.querySelector('p').textContent = (e.reason && e.reason.message) || String(e.reason); }
    });
  </script>
  <style>
    .leaflet-reisplanner-icon { background: none !important; border: none !important; }
    * { box-sizing: border-box; }
    body { background: #f0f9ff; font-family: system-ui, sans-serif; margin: 0; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="js-error" style="display:none;position:fixed;inset:0;background:#fff;z-index:9999;padding:32px;font-family:sans-serif">
    <div style="max-width:400px;margin:0 auto;text-align:center;padding-top:60px">
      <div style="font-size:48px;margin-bottom:16px">😕</div>
      <h2 style="color:#1f2937;margin-bottom:8px">Er ging iets mis</h2>
      <p style="color:#6b7280;font-size:14px;margin-bottom:24px;word-break:break-all"></p>
      <button onclick="window.location.reload()" style="background:#0284c7;color:#fff;border:none;padding:10px 24px;border-radius:12px;font-size:14px;cursor:pointer">Pagina herladen</button>
    </div>
  </div>
  <div id="root"></div>
  <script type="text/babel" src="app.js?v=32"></script>
</body>
</html>
